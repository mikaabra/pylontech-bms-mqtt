# Rack Solar Bridge - BLE Only (no VE.Direct, keeps EPEVER)
# ESP32-S3 Waveshare board for SmartShunt (BLE) + EPEVER MPPT (RS485)

substitutions:
  device_name: rack-solar-bridge
  friendly_name: "Rack Solar Bridge"
  mqtt_prefix: rack-solar
  version: "2026.2.0-ble-only"
  hardware_model: "ESP32-S3 Waveshare"
  manufacturer: "ESPHome"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2026.1.0
  includes:
    - includes/solar_helpers.h
  on_boot:
    priority: 100
    then:
      - logger.log:
          format: "=== BOOT LOGGER ==="
          level: INFO
      - lambda: |-
          id(logger_level_global).set_log_level(ESPHOME_LOG_LEVEL_INFO);
          id(logger_level) = "INFO";

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:
  level: DEBUG
  id: logger_level_global
  baud_rate: 115200

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "rack-solar-fallback"
    password: "fallback123"

esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 1100ms
    active: true

captive_portal:

web_server:
  port: 80

mqtt:
  id: mqtt_client
  broker: !secret mqtt_host
  port: 1883
  username: !secret mqtt_user
  password: !secret mqtt_password
  topic_prefix: "esphome_unused"
  
  birth_message:
    topic: rack-solar/status
    payload: "online"
    retain: true
  will_message:
    topic: rack-solar/status
    payload: "offline"
    retain: true
  
  discovery: false
  
  on_connect:
    - lambda: |-
        ESP_LOGI("mqtt", "=== on_connect START ===");
        bool ss_stale = id(smartshunt_stale);
        bool ss_was_online = id(last_smartshunt_online);
        if (ss_stale && ss_was_online) {
          id(mqtt_client).publish(std::string("rack-solar/smartshunt/status"), std::string("offline"), (uint8_t)0, true);
          id(last_smartshunt_online) = false;
        } else if (!ss_stale && !ss_was_online) {
          id(mqtt_client).publish(std::string("rack-solar/smartshunt/status"), std::string("online"), (uint8_t)0, true);
          id(last_smartshunt_online) = true;
        } else if (ss_stale && !ss_was_online) {
          id(mqtt_client).publish(std::string("rack-solar/smartshunt/status"), std::string("offline"), (uint8_t)0, true);
        }
        bool ep_stale = id(epever_stale);
        bool ep_was_online = id(last_epever_online);
        if (ep_stale && ep_was_online) {
          id(mqtt_client).publish(std::string("rack-solar/epever/status"), std::string("offline"), (uint8_t)0, true);
          id(last_epever_online) = false;
        } else if (!ep_stale && !ep_was_online) {
          id(mqtt_client).publish(std::string("rack-solar/epever/status"), std::string("online"), (uint8_t)0, true);
          id(last_epever_online) = true;
        } else if (ep_stale && !ep_was_online) {
          id(mqtt_client).publish(std::string("rack-solar/epever/status"), std::string("offline"), (uint8_t)0, true);
        }
    - delay: 500ms
    - lambda: |-
        id(publish_discovery).execute();
        ESP_LOGI("mqtt", "Discovery republished on reconnect");
    - lambda: |-
        ESP_LOGI("mqtt", "Resetting publish timestamps...");
        id(last_ss_battery_voltage_publish) = 0;
        id(last_ss_battery_current_publish) = 0;
        id(last_ss_state_of_charge_publish) = 0;
        id(last_ss_instantaneous_power_publish) = 0;
        id(last_ss_consumed_amp_hours_publish) = 0;
        id(last_ss_time_to_go_publish) = 0;
        id(last_epever_solar_voltage_publish) = 0;
        id(last_epever_pv_current_publish) = 0;
        id(last_epever_solar_power_publish) = 0;
        id(last_epever_battery_capacity_publish) = 0;
        id(last_epever_device_temp_publish) = 0;
        id(last_epever_battery_voltage_publish) = 0;
        id(last_epever_battery_current_publish) = 0;
        id(last_epever_total_energy_publish) = 0;
    - mqtt.publish:
        topic: rack-solar/info
        payload: "Rack Solar Bridge - BLE Only version"
        retain: false

  reboot_timeout: 0s

api:

ota:
  - platform: esphome
    password: !secret ota_password

script:
  - id: publish_discovery
    mode: single
    then:
      - lambda: |-
          ESP_LOGI("mqtt", "Publishing HA Discovery configs...");
          char device_payload[256];
          snprintf(device_payload, sizeof(device_payload),
            R"({"device":{"identifiers":["rack_solar_bridge"],"name":"Rack Solar Bridge","model":"Waveshare ESP32-S3","manufacturer":"ESPHome"}})");
          char smartshunt_avail[128];
          snprintf(smartshunt_avail, sizeof(smartshunt_avail),
            "\"availability_topic\":\"rack-solar/smartshunt/status\",\"payload_available\":\"online\",\"payload_not_available\":\"offline\"");
          char epever_avail[128];
          snprintf(epever_avail, sizeof(epever_avail),
            "\"availability_topic\":\"rack-solar/epever/status\",\"payload_available\":\"online\",\"payload_not_available\":\"offline\"");
          char topic[160];
          int publish_count = 0;
          auto pace_publish = [&publish_count]() {
            publish_count++;
            if (publish_count % 10 == 0) delay(50);
          };
          
          // Helper lambda to build discovery payload with conditional fields
          auto build_payload = [&](const char* name, const char* state_topic, const char* unique_id,
                                   const char* unit, const char* device_class, const char* state_class,
                                   const char* avail, const char* device) -> std::string {
            std::string json = "{";
            json += "\"name\":\"" + std::string(name) + "\",";
            json += "\"state_topic\":\"" + std::string(state_topic) + "\",";
            json += "\"unique_id\":\"" + std::string(unique_id) + "\"";
            if (strlen(unit) > 0) {
              json += ",\"unit_of_measurement\":\"" + std::string(unit) + "\"";
            }
            if (strlen(device_class) > 0) {
              json += ",\"device_class\":\"" + std::string(device_class) + "\"";
            }
            if (strlen(state_class) > 0) {
              json += ",\"state_class\":\"" + std::string(state_class) + "\"";
            }
            json += "," + std::string(avail) + "," + std::string(device) + "}";
            return json;
          };
          
          auto build_payload_diag = [&](const char* name, const char* state_topic, const char* unique_id,
                                        const char* unit, const char* device_class, const char* state_class,
                                        const char* device) -> std::string {
            std::string json = "{";
            json += "\"name\":\"" + std::string(name) + "\",";
            json += "\"state_topic\":\"" + std::string(state_topic) + "\",";
            json += "\"unique_id\":\"" + std::string(unique_id) + "\"";
            if (strlen(unit) > 0) {
              json += ",\"unit_of_measurement\":\"" + std::string(unit) + "\"";
            }
            if (strlen(device_class) > 0) {
              json += ",\"device_class\":\"" + std::string(device_class) + "\"";
            }
            if (strlen(state_class) > 0) {
              json += ",\"state_class\":\"" + std::string(state_class) + "\"";
            }
            json += ",\"entity_category\":\"diagnostic\"," + std::string(device) + "}";
            return json;
          };
          
          const char* smartshunt_sensors[][6] = {
            {"ss_battery_voltage", "SmartShunt Battery Voltage", "rack-solar/smartshunt/battery_voltage", "V", "voltage", "measurement"},
            {"ss_battery_current", "SmartShunt Battery Current", "rack-solar/smartshunt/battery_current", "A", "current", "measurement"},
            {"ss_state_of_charge", "SmartShunt State of Charge", "rack-solar/smartshunt/state_of_charge", "%", "battery", "measurement"},
            {"ss_instantaneous_power", "SmartShunt Power", "rack-solar/smartshunt/instantaneous_power", "W", "power", "measurement"},
            {"ss_consumed_amp_hours", "SmartShunt Consumed Ah", "rack-solar/smartshunt/consumed_amp_hours", "Ah", "", "measurement"},
            {"ss_time_to_go", "SmartShunt Time To Go", "rack-solar/smartshunt/time_to_go", "min", "", "measurement"},
          };
          for (int i = 0; i < 6; i++) {
            snprintf(topic, sizeof(topic), "homeassistant/sensor/rack_solar/%s/config", smartshunt_sensors[i][0]);
            char unique_id[64];
            snprintf(unique_id, sizeof(unique_id), "rack_solar_%s", smartshunt_sensors[i][0]);
            std::string payload_str = build_payload(smartshunt_sensors[i][1], smartshunt_sensors[i][2], unique_id,
                                                    smartshunt_sensors[i][3], smartshunt_sensors[i][4], smartshunt_sensors[i][5],
                                                    smartshunt_avail, device_payload);
            id(mqtt_client).publish(std::string(topic), payload_str, 0, true);
            pace_publish();
          }
          const char* epever_sensors[][6] = {
            {"epever_solar_voltage", "EPEVER Solar Voltage", "rack-solar/epever/solar_voltage", "V", "voltage", "measurement"},
            {"epever_pv_current", "EPEVER PV Current", "rack-solar/epever/pv_current", "A", "current", "measurement"},
            {"epever_solar_power", "EPEVER Solar Power", "rack-solar/epever/solar_power", "W", "power", "measurement"},
            {"epever_battery_capacity", "EPEVER Battery Capacity", "rack-solar/epever/battery_capacity", "%", "battery", "measurement"},
            {"epever_device_temp", "EPEVER Device Temperature", "rack-solar/epever/device_temp", "°C", "temperature", "measurement"},
            {"epever_battery_voltage", "EPEVER Battery Voltage", "rack-solar/epever/battery_voltage", "V", "voltage", "measurement"},
            {"epever_battery_current", "EPEVER Battery Current", "rack-solar/epever/battery_current", "A", "current", "measurement"},
            {"epever_total_energy", "EPEVER Total Energy", "rack-solar/epever/total_energy", "kWh", "energy", "total_increasing"},
          };
          for (int i = 0; i < 8; i++) {
            snprintf(topic, sizeof(topic), "homeassistant/sensor/rack_solar/%s/config", epever_sensors[i][0]);
            char unique_id[64];
            snprintf(unique_id, sizeof(unique_id), "rack_solar_%s", epever_sensors[i][0]);
            std::string payload_str = build_payload(epever_sensors[i][1], epever_sensors[i][2], unique_id,
                                                    epever_sensors[i][3], epever_sensors[i][4], epever_sensors[i][5],
                                                    epever_avail, device_payload);
            id(mqtt_client).publish(std::string(topic), payload_str, 0, true);
            pace_publish();
          }
          const char* diagnostic_sensors[][6] = {
            {"rs485_crc_errors", "RS485 CRC Errors", "rack-solar/rs485_crc_errors", "", "", ""},
            {"rs485_timeout_errors", "RS485 Timeout Errors", "rack-solar/rs485_timeout_errors", "", "", ""},
            {"rs485_frame_errors", "RS485 Frame Errors", "rack-solar/rs485_frame_errors", "", "", ""},
            {"smartshunt_stale", "SmartShunt Stale", "rack-solar/smartshunt_stale", "", "", ""},
            {"epever_stale", "EPEVER Stale", "rack-solar/epever_stale", "", "", ""},
            {"free_heap", "Free Heap", "rack-solar/free_heap", "bytes", "", ""},
            {"wifi_signal", "WiFi Signal", "rack-solar/wifi_signal", "dBm", "signal_strength", ""},
            {"uptime", "Uptime", "rack-solar/uptime", "s", "duration", "total_increasing"},
          };
          for (int i = 0; i < 8; i++) {
            snprintf(topic, sizeof(topic), "homeassistant/sensor/rack_solar/%s/config", diagnostic_sensors[i][0]);
            char unique_id[64];
            snprintf(unique_id, sizeof(unique_id), "rack_solar_%s", diagnostic_sensors[i][0]);
            std::string payload_str = build_payload_diag(diagnostic_sensors[i][1], diagnostic_sensors[i][2], unique_id,
                                                         diagnostic_sensors[i][3], diagnostic_sensors[i][4], diagnostic_sensors[i][5],
                                                         device_payload);
            id(mqtt_client).publish(std::string(topic), payload_str, 0, true);
            pace_publish();
          }
          ESP_LOGI("mqtt", "Published %d discovery configs", publish_count);

uart:
  - id: rs485_uart
    tx_pin: GPIO17
    rx_pin: GPIO18
    baud_rate: 115200
    data_bits: 8
    stop_bits: 1
    parity: NONE
    flow_control_pin: GPIO21
    rx_buffer_size: 1024

external_components:
  - source: github://Fabian-Schmidt/esphome-victron_ble
    refresh: 0s

modbus:
  id: modbus1
  uart_id: rs485_uart

modbus_controller:
  - id: epever
    address: 0x1
    modbus_id: modbus1
    command_throttle: 0ms
    update_interval: 30s

victron_ble:
  - id: smartshunt_ble
    mac_address: !secret smartshunt_ble_mac
    bindkey: !secret smartshunt_ble_bindkey
    on_battery_monitor_message:
      then:
        - lambda: |-
            id(ble_message_count)++;
            id(ble_last_message_time) = millis();

text_sensor:
  - platform: version
    name: "ESPHome Version"
    id: esphome_version
    state_topic: null

  - platform: template
    name: "Build Date"
    id: build_date
    icon: "mdi:calendar-clock"
    update_interval: never
    state_topic: null
    lambda: return std::string(__DATE__ " " __TIME__);

  - platform: template
    name: "Debug Level"
    id: debug_level_sensor
    state_topic: null
    icon: "mdi:console"
    update_interval: never
    entity_category: diagnostic
    lambda: return id(logger_level);

  - platform: template
    name: "SmartShunt Stale"
    id: smartshunt_stale_sensor
    state_topic: null
    update_interval: 5s
    icon: "mdi:connection"
    entity_category: diagnostic
    lambda: |-
      return id(smartshunt_stale) ? std::string("STALE") : std::string("OK");
    on_value:
      then:
        - lambda: |-
            static std::string last_smartshunt_stale = "";
            if (x != last_smartshunt_stale) {
              id(mqtt_client).publish("rack-solar/smartshunt_stale", x.c_str());
              last_smartshunt_stale = x;
            }

  - platform: template
    name: "EPEVER Stale"
    id: epever_stale_sensor
    state_topic: null
    update_interval: 5s
    icon: "mdi:connection"
    entity_category: diagnostic
    lambda: |-
      return id(epever_stale) ? std::string("STALE") : std::string("OK");
    on_value:
      then:
        - lambda: |-
            static std::string last_epever_stale = "";
            if (x != last_epever_stale) {
              id(mqtt_client).publish("rack-solar/epever_stale", x.c_str());
              last_epever_stale = x;
            }

  - platform: template
    name: "BLE Connection Status"
    id: ble_connection_status_sensor
    lambda: |-
      uint32_t elapsed = millis() - id(ble_last_message_time);
      if (id(ble_message_count) == 0) return std::string("INITIALIZING");
      if (elapsed < 3000) return std::string("CONNECTED");
      if (elapsed < 30000) return std::string("DEGRADED");
      return std::string("DISCONNECTED");
    update_interval: 5s
    entity_category: diagnostic

sensor:
  - platform: uptime
    name: "Uptime"
    id: uptime_sensor
    state_topic: null
    update_interval: 60s
    device_class: duration
    state_class: total_increasing
    entity_category: diagnostic
    on_value:
      then:
        - lambda: |-
            static int last_uptime = -1;
            int current = (int)x;
            if (current != last_uptime) {
              last_uptime = current;
              id(mqtt_client).publish("rack-solar/uptime", to_string(current));
            }

  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_signal_db
    state_topic: null
    update_interval: 60s
    unit_of_measurement: "dBm"
    device_class: signal_strength
    on_value:
      then:
        - lambda: |-
            static int last_wifi_signal = -1000;
            int current = (int)x;
            if (current != last_wifi_signal) {
              last_wifi_signal = current;
              id(mqtt_client).publish("rack-solar/wifi_signal", to_string(current));
            }

  - platform: template
    name: "Free Heap"
    id: free_heap_sensor
    state_topic: null
    unit_of_measurement: "bytes"
    lambda: return (float)heap_caps_get_free_size(MALLOC_CAP_8BIT);
    update_interval: 30s
    entity_category: diagnostic
    on_value:
      then:
        - lambda: |-
            static int last_free_heap = -1;
            int current = (int)x;
            if (current != last_free_heap) {
              last_free_heap = current;
              id(mqtt_client).publish("rack-solar/free_heap", to_string(current));
            }

  - platform: template
    name: "RS485 CRC Errors"
    id: rs485_crc_errors_sensor
    state_topic: null
    lambda: return (float)id(rs485_crc_errors);
    update_interval: 5s
    entity_category: diagnostic
    on_value:
      then:
        - lambda: |-
            static int last_crc_errors = -1;
            if ((int)x != last_crc_errors) {
              id(mqtt_client).publish("rack-solar/rs485_crc_errors", to_string((int)x));
              last_crc_errors = (int)x;
            }

  - platform: template
    name: "RS485 Timeout Errors"
    id: rs485_timeout_errors_sensor
    state_topic: null
    lambda: return (float)id(rs485_timeout_errors);
    update_interval: 5s
    entity_category: diagnostic
    on_value:
      then:
        - lambda: |-
            static int last_timeout_errors = -1;
            if ((int)x != last_timeout_errors) {
              id(mqtt_client).publish("rack-solar/rs485_timeout_errors", to_string((int)x));
              last_timeout_errors = (int)x;
            }

  - platform: template
    name: "RS485 Frame Errors"
    id: rs485_frame_errors_sensor
    state_topic: null
    lambda: return (float)id(rs485_frame_errors);
    update_interval: 5s
    entity_category: diagnostic
    on_value:
      then:
        - lambda: |-
            static int last_frame_errors = -1;
            if ((int)x != last_frame_errors) {
              id(mqtt_client).publish("rack-solar/rs485_frame_errors", to_string((int)x));
              last_frame_errors = (int)x;
            }

  - platform: template
    name: "BLE Message Count"
    id: ble_message_count_sensor
    unit_of_measurement: "msgs"
    lambda: return (float)id(ble_message_count);
    update_interval: 5s
    entity_category: diagnostic

  - platform: template
    name: "BLE Time Since Last Message"
    id: ble_time_since_last_sensor
    unit_of_measurement: "s"
    lambda: |-
      uint32_t elapsed = millis() - id(ble_last_message_time);
      return (float)(elapsed / 1000);
    update_interval: 5s
    entity_category: diagnostic

  - platform: victron_ble
    victron_ble_id: smartshunt_ble
    name: "SmartShunt Battery Voltage"
    id: ss_battery_voltage
    type: BATTERY_VOLTAGE
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    filters:
      - throttle_average: 5s
    on_value:
      then:
        - lambda: |-
            id(last_smartshunt_data_rx) = millis();
            if (check_threshold_float(x, id(last_ss_battery_voltage),
                                       id(last_ss_battery_voltage_publish),
                                       0.1f, 15.0f, 35.0f)) {
              static char val[16];
              snprintf(val, sizeof(val), "%.2f", id(last_ss_battery_voltage));
              id(mqtt_client).publish("rack-solar/smartshunt/battery_voltage", val);
            }

  - platform: victron_ble
    victron_ble_id: smartshunt_ble
    name: "SmartShunt Battery Current"
    id: ss_battery_current
    type: BATTERY_CURRENT
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    filters:
      - throttle_average: 5s
    on_value:
      then:
        - lambda: |-
            id(last_smartshunt_data_rx) = millis();
            if (check_threshold_float(x, id(last_ss_battery_current),
                                       id(last_ss_battery_current_publish),
                                       0.1f, -200.0f, 200.0f)) {
              static char val[16];
              snprintf(val, sizeof(val), "%.2f", id(last_ss_battery_current));
              id(mqtt_client).publish("rack-solar/smartshunt/battery_current", val);
            }

  - platform: victron_ble
    victron_ble_id: smartshunt_ble
    name: "SmartShunt State of Charge"
    id: ss_state_of_charge
    type: STATE_OF_CHARGE
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    filters:
      - throttle_average: 5s
    on_value:
      then:
        - lambda: |-
            id(last_smartshunt_data_rx) = millis();
            int val = (int) roundf(x);
            if (check_threshold_int(val, id(last_ss_state_of_charge),
                                     id(last_ss_state_of_charge_publish), 1, 0, 100)) {
              id(mqtt_client).publish("rack-solar/smartshunt/state_of_charge", 
                                     to_string(id(last_ss_state_of_charge)));
            }

  - platform: victron_ble
    victron_ble_id: smartshunt_ble
    name: "SmartShunt Instantaneous Power"
    id: ss_instantaneous_power
    type: BATTERY_POWER
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    filters:
      - throttle_average: 5s
    on_value:
      then:
        - lambda: |-
            id(last_smartshunt_data_rx) = millis();
            if (check_threshold_float(x, id(last_ss_instantaneous_power),
                                       id(last_ss_instantaneous_power_publish),
                                       5.0f, -10000.0f, 10000.0f)) {
              static char val[16];
              snprintf(val, sizeof(val), "%.0f", id(last_ss_instantaneous_power));
              id(mqtt_client).publish("rack-solar/smartshunt/instantaneous_power", val);
            }

  - platform: victron_ble
    victron_ble_id: smartshunt_ble
    name: "SmartShunt Consumed Amp Hours"
    id: ss_consumed_amp_hours
    type: CONSUMED_AH
    unit_of_measurement: "Ah"
    state_class: measurement
    filters:
      - throttle_average: 30s
    on_value:
      then:
        - lambda: |-
            id(last_smartshunt_data_rx) = millis();
            if (check_threshold_float(x, id(last_ss_consumed_amp_hours),
                                       id(last_ss_consumed_amp_hours_publish),
                                       1.0f, -999999.0f, 999999.0f)) {
              static char val[16];
              snprintf(val, sizeof(val), "%.1f", id(last_ss_consumed_amp_hours));
              id(mqtt_client).publish("rack-solar/smartshunt/consumed_amp_hours", val);
            }

  - platform: victron_ble
    victron_ble_id: smartshunt_ble
    name: "SmartShunt Time To Go"
    id: ss_time_to_go
    type: TIME_TO_GO
    unit_of_measurement: "min"
    state_class: measurement
    filters:
      - throttle_average: 30s
    on_value:
      then:
        - lambda: |-
            id(last_smartshunt_data_rx) = millis();
            int val = (int) roundf(x);
            if (check_threshold_int(val, id(last_ss_time_to_go),
                                     id(last_ss_time_to_go_publish), 1)) {
